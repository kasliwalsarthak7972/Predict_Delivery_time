<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PredictDelivery - Food Delivery Time Estimator</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header class="app-header">
            <div class="logo">
                <span class="icon">🛵</span>
                <h1>PredictDelivery</h1>
            </div>
            <p>Smart, AI-powered food delivery time estimation.</p>
        </header>

        <section class="glass-panel">
            <form id="prediction-form" class="prediction-form">
                
                <div class="form-row">
                    <div class="input-group">
                        <label for="Distance_km">Distance (km)</label>
                        <input type="number" step="0.01" id="Distance_km" name="Distance_km" required placeholder="e.g. 5.2" min="0">
                    </div>
                    
                    <div class="input-group">
                        <label for="Preparation_Time_min">Prep Time (min)</label>
                        <input type="number" id="Preparation_Time_min" name="Preparation_Time_min" required placeholder="e.g. 15" min="0">
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="Courier_Experience_yrs">Courier Experience (Years)</label>
                        <input type="number" step="0.5" id="Courier_Experience_yrs" name="Courier_Experience_yrs" required placeholder="e.g. 2.5" min="0">
                    </div>
                    
                    <div class="input-group">
                        <label for="Vehicle_Type">Vehicle Type</label>
                        <div class="custom-select-wrapper">
                            <select id="Vehicle_Type" name="Vehicle_Type" required>
                                <option value="Scooter">Scooter</option>
                                <option value="Bike">Bike</option>
                                <option value="Car">Car</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="form-row three-cols">
                    <div class="input-group">
                        <label for="Weather">Weather</label>
                        <div class="custom-select-wrapper">
                            <select id="Weather" name="Weather" required>
                                <option value="Clear">Clear ☀️</option>
                                <option value="Windy">Windy 💨</option>
                                <option value="Foggy">Foggy 🌫️</option>
                                <option value="Rainy">Rainy 🌧️</option>
                                <option value="Snowy">Snowy ❄️</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="Traffic_Level">Traffic Level</label>
                        <div class="custom-select-wrapper">
                            <select id="Traffic_Level" name="Traffic_Level" required>
                                <option value="Low">Low 🟢</option>
                                <option value="Medium">Medium 🟡</option>
                                <option value="High">High 🔴</option>
                            </select>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="Time_of_Day">Time of Day</label>
                        <div class="custom-select-wrapper">
                            <select id="Time_of_Day" name="Time_of_Day" required>
                                <option value="Morning">Morning 🌅</option>
                                <option value="Afternoon">Afternoon 🏙️</option>
                                <option value="Evening">Evening 🌆</option>
                                <option value="Night">Night 🌌</option>
                            </select>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submit-btn">
                    <span class="btn-text">Estimate Time</span>
                    <span class="loader" id="loader"></span>
                </button>
            </form>
        </section>

        <section id="result-section" class="result-section hidden glass-panel">
            <h2>Estimated Delivery Time</h2>
            <div class="time-display">
                <span id="predicted-time" class="highlight-number">--</span>
                <span class="unit">Minutes</span>
            </div>
            <p class="insight-text">Based on current conditions and historical data.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
